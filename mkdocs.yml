site_name: feaweld
site_description: Finite element analysis for weld joint stress, fatigue life, and structural integrity
site_url: https://feaweld.example.org/
repo_name: feaweld
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Tutorials:
      - YAML analysis: tutorials/01_yaml_analysis.md
      - Parametric study: tutorials/02_parametric_study.md
      - Custom post-processing: tutorials/03_custom_postprocessing.md
  - Guides:
      - Visualization: guides/visualization.md
      - Examples: guides/examples.md
  - API reference:
      - core: api/core.md
      - geometry: api/geometry.md
      - mesh: api/mesh.md
      - solver: api/solver.md
      - postprocess: api/postprocess.md
      - fatigue: api/fatigue.md
      - pipeline: api/pipeline.md
      - probabilistic: api/probabilistic.md
      - ml: api/ml.md
      - multiscale: api/multiscale.md
      - digital_twin: api/digital_twin.md
      - singularity: api/singularity.md
      - visualization: api/visualization.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_submodules: true
            members_order: source
            separate_signature: true
            merge_init_into_class: true
            show_signature_annotations: true
            show_if_no_docstring: false
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
